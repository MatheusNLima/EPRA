<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Login | EPRA</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background-color: var(--bg-light); display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .login-card { background: white; padding: 48px; border-radius: var(--radius-xl); box-shadow: var(--shadow-lg); width: 100%; max-width: 420px; box-sizing: border-box; text-align: center; margin: 20px; }
        .login-card h2 { margin-bottom: 32px; font-weight: 700; color: var(--text-dark); }
        .form-group { margin-bottom: 24px; text-align: left; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 500; color: var(--text-light); font-size: 0.9rem; }
        .form-group input { width: 100%; padding: 12px 16px; border: 1px solid var(--outline); border-radius: var(--radius-md); box-sizing: border-box; font-family: 'Poppins', sans-serif; transition: var(--transition-fast); }
        .form-group input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1); }
        .login-logo { font-size: 2rem; font-weight: 800; background: var(--gradient-primary); -webkit-background-clip: text; -webkit-text-fill-color: transparent; display: inline-block; margin-bottom: 16px; text-decoration: none;}
    </style>
</head>
<body>
    <div class="login-card">
        <a href="index.html" class="login-logo">EPRA</a>
        <h2>Bem-vindo de volta</h2>
        <form id="loginForm">
            <div class="form-group">
                <label>E-mail</label>
                <input type="email" id="email" required placeholder="seu@email.com">
            </div>
            <div class="form-group">
                <label>Senha</label>
                <input type="password" id="senha" required placeholder="••••••••">
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%;">Entrar na Plataforma</button>
        </form>
        <p id="mensagemErro" style="color: #ef4444; margin-top: 16px; text-align: center; font-size: 0.9rem; font-weight: 500;"></p>
        <p style="margin-top: 24px; font-size: 0.9rem; color: var(--text-light);">
            <a href="index.html" style="color: var(--primary); text-decoration: none; font-weight: 500;">&larr; Voltar para o Início</a>
        </p>
    </div>
    <script src="js/login.js"></script>
</body>
</html>
