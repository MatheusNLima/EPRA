<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Login | EPRA</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .login-container { display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #f4f7f6; }
        .login-card { background: white; padding: 40px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        .form-group { margin-bottom: 20px; }
        .form-group input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <h2>Login</h2>
            <form id="loginForm">
                <div class="form-group">
                    <label>E-mail</label>
                    <input type="email" id="email" required>
                </div>
                <div class="form-group">
                    <label>Senha</label>
                    <input type="password" id="senha" required>
                </div>
                <button type="submit" class="btn btn-dark" style="width: 100%;">Entrar</button>
            </form>
            <p id="mensagemErro" style="color: #d9534f; margin-top: 15px; text-align: center; font-size: 0.9rem;"></p>
        </div>
    </div>
    <script src="js/config.js"></script>
    <script src="js/login.js"></script>
</body>
</html>
